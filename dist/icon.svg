<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#09090b" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="50%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Icon Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" />
  
  <!-- Outer Glow Ring -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="url(#accent-grad)" stroke-width="4" opacity="0.3" filter="url(#glow)" />
  
  <!-- Stylized Chef Hat and Flame/Kitchen Concept -->
  <g transform="translate(106, 96)">
    <!-- Plate / Base Glow -->
    <ellipse cx="150" cy="270" rx="110" ry="15" fill="#f43f5e" opacity="0.2" filter="url(#glow)" />
    
    <!-- Chef Hat Base -->
    <path d="M 70 230 C 70 210, 230 210, 230 230 C 230 250, 70 250, 70 230 Z" fill="url(#accent-grad)" />
    <rect x="90" y="235" width="120" height="25" rx="5" fill="#ffffff" opacity="0.9" />
    
    <!-- Hat Bubbles (Puffs) -->
    <path d="M 70 220 
             C 40 210, 30 160, 70 140 
             C 50 100, 110 70, 150 110 
             C 190 70, 250 100, 230 140 
             C 270 160, 260 210, 230 220 
             Z" 
          fill="url(#accent-grad)" filter="url(#glow)" />
          
    <path d="M 80 210 
             C 55 200, 45 165, 80 150 
             C 65 115, 115 90, 150 125 
             C 185 90, 235 115, 220 150 
             C 255 165, 245 200, 220 210 
             Z" 
          fill="#ffffff" opacity="0.15" />
          
    <!-- Magic Recipe sparkles -->
    <path d="M 280 80 L 285 95 L 300 100 L 285 105 L 280 120 L 275 105 L 260 100 L 275 95 Z" fill="#f59e0b" filter="url(#glow)" />
    <path d="M 40 80 L 43 90 L 53 93 L 43 96 L 40 106 L 37 96 L 27 93 L 37 90 Z" fill="#f59e0b" filter="url(#glow)" />
    <path d="M 260 220 L 263 226 L 269 228 L 263 230 L 260 236 L 257 230 L 251 228 L 257 226 Z" fill="#f59e0b" />
  </g>
</svg>
